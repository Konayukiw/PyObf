# PyObf configuration file
# CLI arguments override values in this file when provided.

[output]
# Fixed output filename. Leave empty to use <target>_obf.py
# Relative paths are resolved next to the target file.
filename =

[names]
# Random identifier length: single number (e.g. 3) or range (e.g. 3-6)
length = 3

[junk]
# Junk insertion frequency: 0 = none, 10 = insert around every statement
frequency = 6

[string]
# Mix environment-dependent key material (directory ctime millis)
env_key = true
# Path used for environment key derivation (Windows default: C:/Users/)
env_key_path = C:/Users/
# Pipeline stages (true/false). Middle stages Swap/Rotate/ByteShuffle
# are applied in a random order per string when enabled.
xor = true
swap = true
rotate = true
byte_shuffle = true
base85 = true

[obfuscation]
# Rename functions / variables / parameters
rename = true
# Replace import statements with getattr(__import__(...)) form
hide_imports = true
# Wrap numeric literals in trivial arithmetic
value_calc = true
# Multi-stage string encryption
encrypt_strings = true
# Optional fixed RNG seed (empty = random each run)
seed =
