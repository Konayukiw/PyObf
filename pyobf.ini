# PyObf configuration file
# CLI arguments override values in this file when provided.


[output]
# Leave empty to use default: <target>_obf.py.
# Relative paths are resolved next to the target file.
filename =


[names]
# Random identifier length.
# Specified value: n
# Range value: n-m 
length = 4-6


[junk]
# Junk insertion frequency.
# Valid range: 0-10
# 0 = No junk
# 10 = Junk inserted after every 10 statements
frequency = 6


[string]
# Mix environment-dependent key material.

env_key = true

# Path used for obfuscation key derivation.
# Windows default: C:/Users/
env_key_path = C:/Users/

# Pipeline stages.
# Valid values: true / false
xor = true
swap = true
rotate = true
byte_shuffle = true
base85 = true


[obfuscation]
# Rename functions / variables / parameters.

rename = true

# Replace import statements with getattr(__import__(...)) form.
hide_imports = true

# Wrap numeric literals in trivial arithmetic.
value_calc = true

# Multi-stage string encryption.
encrypt_strings = true

# Optional fixed RNG seed.
# Empty value means random seed is used.
seed =
